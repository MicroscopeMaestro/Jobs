    Funktionalität sowie Sicherheit der Laborausstattung streng nach Vorgaben zu gewährleisten.

    '
  - 'Auch aus meiner früheren Tätigkeit als Machine Vision System Engineer bei INTECOL
    S.A.S. bringe ich wertvolle industrielle Erfahrung in der optischen Material-
