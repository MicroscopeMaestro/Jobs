  body_paragraphs:
  - 'As an optical engineer with a Ph.D. specializing in wavefront sensing, interferometric metrology, and opto-mechatronic system integration, I am eager to bring my expertise to ASML. I am drawn to ASML''s mission of pushing the physical limits of precision optical systems, and I am confident that my hands-on experience in diffraction-limited metrology and system integration aligns directly with the challenges your teams face in EUV lithography development.'
  - 'During my Ph.D. at the Medical University of Innsbruck, I designed and built from scratch a fully automated wavefront sensing and phase-retrieval system — writing the complete C++/Python/LabVIEW control stack, integrating 63-actuator Deformable Phase Plates and spatial light modulators, and implementing iterative interferometric (F-SHARP) algorithms to achieve diffraction-limited resolution. Optical performance was validated through custom Python wave-field simulations based on Zernike decomposition, supported by familiarity with ZEMAX OpticStudio for tolerancing. This work resulted in two peer-reviewed publications (ACS Photonics 2025, Biomedical Optics Express 2023) and directly mirrors the kind of precision optical sensing and aberration-correction challenges tackled in EUV lithography systems.'
  - 'Prior to my Ph.D., I prototyped a dispersive 1064 nm fiber probe Raman spectrometer at IPHT Jena — handling optical layout through detector calibration — and deployed Halcon-based machine vision inspection pipelines in a high-speed industrial setting at INTECOL S.A.S. This combination of academic photonics depth, hands-on metrology, and industrial systems thinking positions me well to contribute to ASML''s optical module development and qualification workflows.'
  - 'I am completing my Ph.D. in May 2026 and am available to relocate to Veldhoven. I would welcome the opportunity to discuss how my background in high-precision optical metrology and system integration can support your teams.'
  closing: Sincerely,
  resume:
    summary: 'Optical Systems Engineer with a Ph.D. in adaptive optics and a track record of end-to-end precision instrument development: from interferometric wavefront sensing through C++/Python/LabVIEW integration and peer-reviewed validation. Deep expertise in optical wave-field simulation and Zernike-based aberration modeling; familiar with ZEMAX OpticStudio for tolerancing. ZEISS Summer School alumnus. Available May 2026.'
    competencies:
    - category: Wavefront Sensing \& Interferometric Metrology
      details: Designed and deployed interferometry and wavefront optimization for sub-wavelength aberration correction. Novel spatial-shift algorithm (''3N method'') enabling high-accuracy phase retrieval in diffraction-limited systems.
    - category: Optical Simulation \& Modeling
      details: Deep knowledge of wave-field propagation modeling and Zernike polynomial decomposition, implemented in custom Python simulation frameworks. Familiar with ZEMAX OpticStudio for optical tolerancing and aberration sensitivity analysis.
    - category: Opto-Mechatronic Integration \& Automation
      details: Full hardware-software integration of adaptive optics systems (deformable mirrors, SLMs, galvo scanners, scientific cameras) via C++/Python/LabVIEW. Automated calibration and alignment routines ensuring repeatable, high-precision performance.
    - category: Machine Vision \& Industrial Inspection
      details: Industrial deployment of Halcon and OpenCV pipelines for high-speed automated inspection and defect detection. Custom illumination design (bright-field, dark-field, ring-light) for challenging surface-inspection tasks.
