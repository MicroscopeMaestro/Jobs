  salutation: Dear Ms. Memeti,
  body_paragraphs:
  - 'As a PhD physicist with deep expertise in optical metrology, I am applying for the
    position of Process Engineer at your Heerbrugg site. I am specifically seeking
    a role where I can apply my analytical skills to ensure your manufacturing processes
    operate at the highest level of precision.
    '
  - 'During my PhD, my focus was on building and validating high-resolution optical
    measurement systems (interferometry, wavefront analysis). To ensure high process
    stability, I use LabVIEW and Python extensively for the automation of calibration
    procedures. Previously, at INTECOL S.A.S., I was responsible for the design of
    industrial inspection systems in compliance with industry standards (e.g., ISO
    10110).
    '
  - 'Fully integrated into the DACH work culture, I will be available for employment
    from May 2026. I look forward to sustainably optimizing development and qualification
    processes at SwissOptic/Jenoptik.
    '
  closing: Sincerely,
  resume:
    summary: 'Physicist and Optical Engineer with extensive expertise in precision
      metrology, interferometry, and high-resolution instrument development. Proven
      track record in bringing complex optical systems from concept to industrial-grade
      prototypes. Strong foundation in Python/C++ automation, ZEMAX simulation, and
      quality assurance under industrial norms (ISO 10110/9001).
      '
    competencies:
    - category: Optical Metrology \& System Design
      details: End-to-end design and assembly of multiphoton/confocal microscopes and
        interferometric setups. Expertise in wavefront sensing and diffraction-limited
        system alignment.
    - category: Simulation \& Tolerancing
      details: Advanced use of ZEMAX OpticStudio for systematic tolerance analysis,
        sensitivity characterization of custom objectives, and Zernike-based wave-field
        simulations in Python.
    - category: Software \& Automation
      details: Expert proficiency in C++, Python (NumPy, Pandas, Scikit-learn, JAX),
        and LabVIEW/FPGA for real-time hardware control, detector calibration, and
        automation of calibration routines.
    - category: Industrial Vision \& QA
      details: Hands-on experience with Halcon and Cognex VisionPro for production-line
        inspection. Proficient in MSA (Gage R\&R) and designing custom illumination
        concepts (Bright-field/Dark-field).
    - category: Standards \& Compliance
      details: Strong awareness of ISO 10110 and ISO 9001 standards. Experienced in
        managing EH\&S compliance and maintaining technical documentation for high-power
        laser environments.
    experience:
    - institution: Medical University of Innsbruck
      link: https://www.i-med.ac.at/dpmp/bmp/staff/
      location: Innsbruck, Austria
      position: PhD Researcher - Optical Metrology \& Automation
      dates: Jan 2022 -- Present
      bullets:
      - \textbf{Metrology System Build:} Designed and automated a custom wavefront
        sensing and phase retrieval system from scratch; wrote complete control stacks
        in C++/Python to interface cameras with deformable mirrors.
      - \textbf{Optical Characterization:} Performed rigorous ZEMAX tolerance analysis
        to characterize aberration sensitivity in custom-built microscope objectives,
        validated via experimental interferometry.
      - \textbf{R\&D Project Leadership:} Led the hardware-software integration of
        a multiphoton microscope system, achieving diffraction-limited performance
        while managing vendor qualifications (Thorlabs, Edmund Optics).
      - \textbf{Lab Operations:} Primary operator for a high-power laser lab, managing
        safety compliance (EH\&S), equipment maintenance logs, and technical spec-sheet
        documentation.
    - institution: Leibniz Institute of Photonic Technology (IPHT)
      link: https://www.leibniz-ipht.de/en/homepage/
      location: Jena, Germany
      position: R\&D Researcher (Photonics \& Data)
      dates: Jun 2020 -- Dec 2021
      bullets:
      - \textbf{Spectrometer Prototyping:} Designed and built a 1064 nm fiber-probe
        Raman spectrometer for non-invasive clinical use; handled end-to-end optical
        layout, dispersive optic alignment, and detector calibration.
      - \textbf{Data Science \& ML:} Applied supervised Machine Learning to hyperspectral
        photonic data using custom Python packages, achieving high-accuracy tissue
        classification and accelerating experimental validation loops.
      - \textbf{Interdisciplinary Research:} Collaborated on clinical spectroscopy
        projects, resulting in two peer-reviewed publications in Applied Sciences
        and ACS Photonics.
    - institution: INTECOL S.A.S.
      link: https://intecol.com.co/
      location: Medellín, Colombia
      position: Junior Machine Vision System Engineer
      dates: Mar 2018 -- Mar 2019
      bullets:
