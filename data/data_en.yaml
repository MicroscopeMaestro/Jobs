  body_paragraphs:
  - 'As a physicist and optical engineer with a strong background in precision metrology,
    I am motivated to apply for the Optical Metrology Engineer position at
    your Munich Lab. Bringing measurement systems from concept to automated, fully
    functional prototypes is my core strength, and I would be glad to apply this expertise
    to develop next-generation measurement instruments with your R\&D team.

    '
  - 'During my Ph.D. at the Medical University of Innsbruck, I developed a system-level
    understanding of complex optical instruments. I designed and built an automated
    wavefront sensing and phase retrieval system from scratch, automating the optical
    benchtop configuration using Python and C++. To understand the aberration sensitivity
    of these custom optics, I routinely performed systematic optical modeling and
    tolerance analysis using ZEMAX OpticStudio alongside custom wavefield simulations.

    '
  - 'At the Leibniz Institute of Photonic Technology (IPHT) in Jena, I deepened my
    instrumentation and spectroscopy expertise by building a dispersive 1064 nm fiber
    probe Raman spectrometer. Beyond optical layout and detector calibration, I heavily
    utilized Python (Pandas, NumPy, Scikit-learn) to perform rigorous mathematical
    data analysis on hyperspectral images. This end-to-end approach ensured precise
    measurement validation and directly guided the engineering design.

    '
  - 'Having spent the last four years in the tirol region, I am integrated into
    the german/austrian working culture and continuously improving my German (B2). I am completing
    my Ph.D. this May and for now I have a researscher resident permit that it would be seamlessly easy to adapt for a working permit. 
    I would welcome the opportunity to discuss how my hands-on
    metrology experience can contribute to your automated machine vision solutions.

    '
  closing: Sincerely,
