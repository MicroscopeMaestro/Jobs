    verantwortlich. Fundierte Reportings und die enge Abstimmung von Testverfahren
    mit den Design-Ingenieuren sind mir dadurch bestens vertraut.

    '
  - 'Ursprünglich aus Kolumbien, habe ich meinen Master in Jena absolviert und promoviere
    nun in Innsbruck, weshalb ich bereits fest im Tiroler Alpenraum verwurzelt bin
    und diesen Standort sehr schätze. Mein Deutsch ist derzeit auf B2-Niveau und ich
    verbessere es im täglichen Gebrauch kontinuierlich. Mein aktueller Aufenthaltstitel
    (Resident Permit) als Forscher in Österreich lässt sich für diese Industrieanstellung
    nahtlos und unbürokratisch in eine reguläre Arbeitsbewilligung umwandeln, sodass
