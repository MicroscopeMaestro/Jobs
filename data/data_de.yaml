        production lines (glass bottle inspection), implementing custom illumination
        concepts to solve liquid level and label printing quality issues.
      - \textbf{System Commissioning:} Successfully deployed automated inspection
        solutions for clients like Renault, utilizing Cognex VisionPro for robotic
        part recognition and flame-surface treatment.
      - \textbf{Process Reliability:} Conducted feasibility studies and Gage R\&R
        assessments to ensure measurement traceability and process stability under
        industrial conditions.
